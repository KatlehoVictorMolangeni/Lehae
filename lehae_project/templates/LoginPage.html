{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lehae Security - Login to Your Account</title>

<link rel="icon" type="image/png" href="{% static 'images/Lehae-head-logo.png' %}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root {
    --dark-blue: #080144;
    --gold: #d4af37;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 40px;
    border-bottom: 1px solid #eee;
}

.logo {
    height: 150px;
}

.nav-right {
    display: flex;
    gap: 10px;
}

.nav-btn {
    padding: 8px 14px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 500;
}

.login {
    border: 1px solid var(--gold);
    color: var(--dark-blue);
}

.signup {
    background: var(--gold);
    color: var(--dark-blue);
}

/* PAGE */
.page {
    max-width: 520px;
    margin: 60px auto;
    padding: 20px;
}

/* HEADER */
.logo-center {
    display: block;
    margin: 0 auto;
    height: 90px;
}

h2 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    color: var(--dark-blue);
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin: 10px 0 30px;
    position: relative;
}

h2::after {
    content: "";
    display: block;
    width: 60px;
    height: 3px;
    background: var(--gold);
    margin: 10px auto 0;
    border-radius: 2px;
}

/* FIELD */
.field {
    margin-bottom: 25px;
}

.label {
    font-size: 14px;
    font-weight: 500;
    color: var(--dark-blue);
    margin-bottom: 5px;
}

/* INPUT LINE */
.input-line {
    display: flex;
    align-items: center;
    border-bottom: 2px solid #ddd;
    padding: 8px 0;
    gap: 10px;
}

.input-line input {
    border: none;
    outline: none;
    width: 100%;
    font-size: 15px;
    background: transparent;
}

.input-line:focus-within {
    border-bottom: 2px solid var(--gold);
}

/* PASSWORD ICON */
.toggle-password {
    cursor: pointer;
    color: #999;
}

/* FORGOT PASSWORD */
.forgot {
    text-align: right;
    font-size: 13px;
    margin-top: -10px;
    margin-bottom: 20px;
}

/* links inside terms */
.forgot a {
    color: var(--dark-blue);
    font-weight: 600;
    text-decoration: none;
    position: relative;
}

/* subtle underline animation */
.forgot a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 0%;
    height: 2px;
    background: var(--gold);
    transition: 0.3s ease;
}

.forgot a:hover::after {
    width: 100%;
}

.forgot a:hover {
    color: var(--gold);
}



/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 80px;
    border: none;
    font-weight: 800;
    background: var(--gold);
    color: var(--dark-blue);
    cursor: pointer;
}

/* ACCOUNT */
.account {
    text-align: center;
    font-size: 13px;
    margin-top: 30px;
}

.account a {
    color: var(--dark-blue);
    font-weight: 600;
    text-decoration: none;
}

/* FOOTER FULL WIDTH */
.footer {
    text-align: center;
    font-size: 13px;
    margin-top: 40px;
    padding: 20px 0;
    border-top: 1px solid #e5e5e5;
    color: #666;

    width: 100vw;
    position: relative;
    left: 50%;
    margin-left: -50vw;
}

/* LOADER */
#page-loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader-logo {
    width: 180px;
    animation: pulse 1.2s infinite;
}

.loader-bar {
    width: 220px;
    height: 4px;
    background: #eee;
    margin-top: 15px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

.loader-bar::before {
    content: "";
    position: absolute;
    width: 40%;
    height: 100%;
    background: var(--gold);
    animation: slide 1.2s infinite;
}

@keyframes slide {
    0% { left: -40%; }
    50% { left: 60%; }
    100% { left: -40%; }
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

.required {
    color: var(--gold);
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="page-loader">
    <div>
        <img src="{% static 'images/lehae-main-logo.png' %}" class="loader-logo">
        <div class="loader-bar"></div>
    </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
    <img src="{% static 'images/lehae-main-logo.png' %}" class="logo">

    <div class="nav-right">
        <a href="{% url 'Login' %}" class="nav-btn login">Login</a>
        <a href="{% url 'Register' %}" class="nav-btn signup">Sign Up</a>
    </div>
</div>

<!-- PAGE -->
<div class="page">

    <img src="{% static 'images/Lehae-head-logo.png' %}" class="logo-center">

    <h2>Lehae Login.</h2>

    <form method="POST">
    {% csrf_token %}

    {% if error %}
    <div style="color:red; text-align:center;">
        {{ error }}
    </div>
{% endif %}
    <!-- EMAIL -->
    <div class="field">
        <div class="label">Email address <span class="required">*</span></div>
        <div class="input-line">
            <input type="email" name="email" required>
        </div>
    </div>

    <!-- PASSWORD -->
    <div class="field">
        <div class="label">Password <span class="required">*</span></div>
        <div class="input-line">
            <input type="password" name="password" id="loginPassword" required>
            <span class="material-icons toggle-password" onclick="togglePassword('loginPassword', this)">
                visibility_on
            </span>
        </div>
    </div>

    <!-- FORGOT -->
    <div class="forgot">
        <a href="#">Forgot password?</a>
    </div>

    <!-- BUTTON -->
    <button type="submit">Login</button>
    </form>

    <!-- ACCOUNT -->
    <div class="account">
        Don’t have your Lehae account? <a href="{% url 'Register' %}"> Go Sign up Page</a>
    </div>

    <div class="footer">
        © 2026 Lehae (Pty) Ltd. All rights reserved
    </div>

</div>
321

89
<script>
window.addEventListener("load", function () {
    setTimeout(() => {
        document.getElementById("page-loader").style.display = "none";
    }, 1000);
});

function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);

    if (input.type === "password") {
        input.type = "text";
        icon.innerText = "visibility";
    } else {
        input.type = "password";
        icon.innerText = "visibility_off";
    }
}
</script>

</body>
</html>
